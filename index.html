<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Get a Quote</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <div class="form-wrapper">
            <div class="form-header">
                <h1>Let's Connect</h1>
                <p>Fill out the form below and our team will get back to you instantly.</p>
            </div>
            
            <form id="leadForm">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>

                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required>
                </div>

                <div class="input-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="4" placeholder="Tell us more about your requirements..." required></textarea>
                </div>

                <button type="submit" id="submitBtn">
                    <span>Send Inquiry</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>

            <div id="responseMessage" class="response-message"></div>
        </div>
    </div>

    <script>
        // Direct Telegram Setup (No n8n needed for live version)
        const TELEGRAM_BOT_TOKEN = '8637018723:AAGSdpY-_v3nQixuNnka9Ag78yjfm-g64s0';
        const TELEGRAM_CHAT_ID = '1290282570';

        const leadForm = document.getElementById('leadForm');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const responseMessage = document.getElementById('responseMessage');

        leadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Feedback
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            responseMessage.style.display = 'none';

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const message = document.getElementById('message').value;

            const text = `🚀 *New Lead Received*\n\n👤 *Name:* ${name}\n📧 *Email:* ${email}\n📞 *Phone:* ${phone}\n💬 *Message:* \n${message}`;

            try {
                const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: text,
                        parse_mode: 'Markdown'
                    }),
                });

                if (response.ok) {
                    showMessage('Success! Your inquiry has been sent.', 'success');
                    leadForm.reset();
                } else {
                    showMessage('Oops! Telegram service error. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Network error. Please check your connection.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
            }
        });

        function showMessage(text, type) {
            responseMessage.textContent = text;
            responseMessage.className = `response-message ${type}`;
            responseMessage.style.display = 'block';
        }
    </script>
</body>
</html>
